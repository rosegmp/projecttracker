name: Continuous integration

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  web:
    name: Web build, tests, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run regression tests
        run: npm test

      - name: Build production web app
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Report development dependency advisories
        continue-on-error: true
        run: npm audit --audit-level=high

  android:
    name: Android sync and debug build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 36
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - name: Install locked dependencies
        run: npm ci

      - name: Build production web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build Android debug APK
        run: |
          chmod +x android/gradlew
          ./android/gradlew --no-daemon -p android assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: project-tracker-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
